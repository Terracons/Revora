databases:
  - name: revora-db
    plan: free

services:
  - type: web
    name: revora-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        fromDatabase:
          name: revora-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
